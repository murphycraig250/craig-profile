lookup_options:
  profile::linux_user::user_list:
    merge:
      strategy: deep
      knockout_prefix: '--'
  profile::linux_group::group_list:
    merge:
      strategy: deep
      knockout_prefix: '--'

profile::linux_user::user_list:  
  lab_user:
    groups: ['lab_group']
  _user:
    ensure: absent
  
profile::linux_group::group_list:
  labadmins: {}
  users: {}
  lab_group: {}
  testgroup:
    ensure: absent
  _group:
    ensure: absent
  